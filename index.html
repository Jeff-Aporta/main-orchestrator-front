  <script>
    (function () {
      var k = "main-orchestrator:theme";
      var m = "dark";
      try {
        var v = localStorage.getItem(k);
        if (v === "light" || v === "dark") m = v;
      } catch (e) { /* ignore */ }
      document.documentElement.setAttribute("data-mui-color-scheme", m);
      document.documentElement.style.colorScheme = m;
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "@emotion/react": "https://esm.sh/@emotion/react@11.14.0?external=react,react-dom",
    "@emotion/styled": "https://esm.sh/@emotion/styled@11.14.1?external=react,react-dom,@emotion/react",
    "@mui/material": "https://esm.sh/@mui/material@9.1.0?external=react,react-dom,@emotion/react,@emotion/styled",
    "@mui/material/": "https://esm.sh/@mui/material@9.1.0/"
  }
}
  </script>
  <script defer src="https://cdn.jsdelivr.net/gh/Jeff-Aporta/front-shared@9f0ec53/cdn/isa/js/core/app-meta.js"></script>
  <script defer src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
  <script defer src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script defer>
    AppMeta.initFromDocument();
    (async function () {
      try {
        var res = await fetch("js/boot/loader.ts", { cache: "no-store" });
        if (!res.ok) throw new Error("No se pudo cargar el loader (" + res.status + ")");
        var out = Babel.transform(await res.text(), { presets: ["typescript"], filename: "loader.ts" }).code;
        eval(out);
      } catch (e) {
        document.getElementById("root").innerHTML =
          '<pre style="color:#ff8a80;padding:24px;font-family:monospace">Bootstrap error:\n' + (e && e.stack ? e.stack : e) + "</pre>";
      }
    })();
  </script>
</head>

<body>
  <div id="root">
    <style>
      html {
        color-scheme: dark;
        background: #060d18;
      }
      html[data-mui-color-scheme="light"] {
        color-scheme: light;
        background: #eef4ff;
      }
      body {
        margin: 0;
        height: 100%;
        background: inherit;
      }
      #root {
        height: 100%;
        min-height: 100vh;
      }
      .isa-app-boot {
        height: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        background: #060d18;
        color: #94a3b8;
        font-size: 0.95rem;
        letter-spacing: 0.01em;
      }
      html[data-mui-color-scheme="light"] .isa-app-boot {
        background: #eef4ff;
        color: #64748b;
      }
      .isa-app-boot-shimmer {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        position: relative;
        isolation: isolate;
      }
      .isa-app-boot-shimmer iconify-icon {
        color: #94a3b8;
        flex-shrink: 0;
      }
      html[data-mui-color-scheme="light"] .isa-app-boot-shimmer iconify-icon {
        color: #64748b;
      }
      .isa-app-boot-shimmer > span {
        font-weight: 500;
        background: linear-gradient(100deg, #94a3b8 0%, #94a3b8 38%, rgba(30, 144, 255, 0.45) 46%, #1e90ff 50%, #63b3ff 53%, rgba(0, 229, 255, 0.5) 57%, #94a3b8 64%, #94a3b8 100%);
        background-size: 240% 100%;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
        animation: isa-boot-text-shimmer 2.6s ease-in-out infinite;
      }
      html[data-mui-color-scheme="light"] .isa-app-boot-shimmer > span {
        background: linear-gradient(100deg, #64748b 0%, #64748b 38%, rgba(30, 144, 255, 0.55) 46%, #1e90ff 50%, #4aa3ff 53%, rgba(0, 180, 220, 0.65) 57%, #64748b 64%, #64748b 100%);
        background-size: 240% 100%;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
      }
      .isa-app-boot-shimmer::after {
        content: "";
        position: absolute;
        inset: -3px -6px;
        z-index: 1;
        pointer-events: none;
        border-radius: 6px;
        background: linear-gradient(100deg, transparent 0%, transparent 36%, rgba(30, 144, 255, 0.22) 44%, rgba(30, 144, 255, 0.62) 50%, rgba(99, 179, 255, 0.52) 54%, rgba(0, 229, 255, 0.38) 58%, transparent 66%, transparent 100%);
        background-size: 240% 100%;
        animation: isa-boot-text-shimmer 2.6s ease-in-out infinite;
        mix-blend-mode: screen;
        opacity: 0.82;
      }
      html[data-mui-color-scheme="light"] .isa-app-boot-shimmer::after {
        mix-blend-mode: soft-light;
        opacity: 0.9;
      }
      @keyframes isa-boot-text-shimmer {
        0% { background-position: 115% 50%; }
        100% { background-position: -15% 50%; }
      }
    </style>
    <div class="isa-app-boot">
      <div class="isa-app-boot-shimmer">
        <iconify-icon icon="mdi:transit-connection-variant" width="1.5em" height="1.5em"></iconify-icon>
        <span>Cargando Catálogo…</span>
      </div>
    </div>
  </div>
</body>

</html>
